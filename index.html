<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hanmaybe</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: radial-gradient(circle at top, #111 0%, #000 70%);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

h1 {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #7f5af0, #2cb67d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 3s ease-in-out infinite alternate;
}

p {
    margin-top: 20px;
    font-size: 18px;
    color: #aaa;
    max-width: 400px;
    text-align: center;
}

.buttons {
    margin-top: 40px;
}

.buttons a {
    text-decoration: none;
    color: white;
    border: 1px solid #333;
    padding: 12px 25px;
    margin: 0 10px;
    border-radius: 30px;
    transition: 0.3s;
}

.buttons a:hover {
    background: #7f5af0;
    border-color: #7f5af0;
}

@keyframes glow {
    from {
        text-shadow: 0 0 10px #7f5af0;
    }
    to {
        text-shadow: 0 0 25px #2cb67d;
    }
}
</style>
</head>

<body>

<h1>@hanmaybe</h1>

<p>
Digital creator. Minimal mind.  
Building bots, ideas and quiet projects.
</p>

<div class="buttons">
    <a href="#">Telegram</a>
    <a href="#">GitHub</a>
</div>

</body>
</html>
