<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HanMaybe</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 40px rgba(0,255,200,0.2);
    animation: fadeIn 1.5s ease forwards;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin-bottom: 20px;
    border: 3px solid #00ffc8;
    object-fit: cover;
    box-shadow: 0 0 20px rgba(0,255,200,0.6);
}

h1 {
    font-size: 32px;
    margin-bottom: 8px;
    color: #00ffc8;
}

.bio {
    font-size: 16px;
    opacity: 0.85;
    margin-bottom: 25px;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #00ffc8;
    color: black;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #00cfa0;
    transform: scale(1.05);
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>

<div class="card">

    <!-- ТВОЁ ФОТО -->
    <img src="photo.jpg" class="avatar">

    <h1>HanMaybe</h1>

    <div class="bio">
        17 y.o. dreamer
    </div>

    <a href="https://t.me/hanmaybe" class="btn" target="_blank">
        @hanmaybe
    </a>

</div>

</body>
</html>
